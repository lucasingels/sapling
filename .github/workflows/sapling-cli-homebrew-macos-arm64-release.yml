name: Release - Homebrew macOS-arm64
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The version to release, e.g. 1.2.3'
        required: true
  push:
    tags:
      - v*
      - test-release-*

jobs:
  build:
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6       
    - name: Build bottle
      run: |
        # Grant access
        git config --global --add safe.directory "$PWD"

        # Get version from tag or input
        VERSION=${{ inputs.version || format('{0}', github.ref_name) }}
        echo "VERSION=${VERSION#v}" >> $GITHUB_ENV

        # Build
        eden/scm/packaging/mac/build_bottle.sh $VERSION
    - name: Create pre-release
      run: bash ci/retry.sh bash ci/create-release.sh $VERSION
    - name: Upload Release
      run: bash ci/retry.sh \
        gh release upload --clobber $VERSION \
        sapling-dev-$VERSION.arm64.bottle.tar.gz
